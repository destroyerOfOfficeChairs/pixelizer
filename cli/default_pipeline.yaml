operations:
  - type: pixel_size
    size: 16
  - type: trim_height
    mode: both
  - type: trim_width
    mode: both
  - type: posterize
    levels: 5
  - type: blur
    sigma: 4.0
  - type: palette_map
    # colors:
    #   - "#0f380f"
    #   - "#306230"
    #   - "#8bac0f"
    #   - "#9bbc0f"
    colors:
      - "#2c2416"
      - "#6e5a3d"
      - "#a08658"
      - "#c4a875"
      - "#d4b896"
      - "#e8d5a8"
    # colors:
    #   - "#000000"
    #   - "#1d2b53"
    #   - "#7e2553"
    #   - "#008751"
    #   - "#ab5236"
    #   - "#5f574f"
    #   - "#c2c3c7"
    #   - "#fff1e8"
    #   - "#ff004d"
    #   - "#ffa300"
    #   - "#ffec27"
    #   - "#00e436"
    #   - "#29adff"
    #   - "#83769c"
    #   - "#ff77a8"
    #   - "#ffccaa"
    dither:
      kind: atkinson
      # kind: floyd_steinberg
      # kind: jjn
      # clamp: true
      bleed: 0.2
  - type: downsample
  - type: upscale
    factor: 16
