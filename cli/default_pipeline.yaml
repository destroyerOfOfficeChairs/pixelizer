operations:
  - type: downsample
    pixel_size: 16
    trim: trim_all
  - type: normalize
    low: .05
    high: .95
  - type: palette_map
    colors:
      - "#2c2416"
      - "#6e5a3d"
      - "#a08658"
      - "#c4a875"
      - "#d4b896"
      - "#e8d5a8"
    dither:
      algorithm: bayer8
      strength: 32.0
  - type: upscale
    factor: 16
