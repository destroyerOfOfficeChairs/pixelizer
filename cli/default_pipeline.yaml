operations:
  - type: pixel_size
    size: 16
  - type: trim_height
    mode: both
  - type: trim_width
    mode: both
  - type: posterize
    levels: 5
  - type: blur
    sigma: 4.0
  - type: downsample
  - type: normalize
  - type: palette_map
    colors:
      - "#2c2416"
      - "#6e5a3d"
      - "#a08658"
      - "#c4a875"
      - "#d4b896"
      - "#e8d5a8"
    # dither:
    #   algorithm: atkinson
    #   bleed: 0.2
    #   clamp: false
    dither:
      algorithm: bayer8
      strength: 32.0
  - type: upscale
    factor: 16
