operations:
  - type: pixel_size
    size: 16
  - type: trim_height
    mode: both
  - type: trim_width
    mode: both
  - type: palette_map
    colors:
      - "#0f380f"
      - "#306230"
      - "#8bac0f"
      - "#9bbc0f"
    dither:
      kind: atkinson
      # kind: floyd_steinberg
      # kind: j_j_n
      clamp: true
      bleed: 0.2
  - type: downsample
  - type: upscale
    factor: 16
